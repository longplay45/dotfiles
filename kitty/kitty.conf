# ============================================================
# Kitty main config (macOS) — tuned for daily dev use
# ============================================================

# ----------------------------
# Window / layout
# ----------------------------
tab_bar_edge top
tab_bar_style fade

window_padding_width 10
window_border_width 2
active_border_color #00ff00

# Remember last window size (more natural on macOS)
remember_window_size yes

# Sensible default size for new windows (cell-based, consistent)
initial_window_width 120c
initial_window_height 35c

# Titlebar tint: choose ONE (system | background | <color>)
macos_titlebar_color background


# ----------------------------
# Transparency
# ----------------------------
# Keep it subtle; readability > aesthetics
background_opacity 0.92
dynamic_background_opacity no


# ----------------------------
# Cursor / bell
# ----------------------------
cursor_blink_interval 0

# Audio bell is usually annoying; use a subtle visual bell
enable_audio_bell no
visual_bell_duration 0.08


# ----------------------------
# Clipboard / selection
# ----------------------------
copy_on_select yes
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard


# ----------------------------
# URLs
# ----------------------------
detect_urls yes
open_url_with default
url_style curly


# ----------------------------
# Fonts (readability first)
# ----------------------------
font_family Hack
bold_font auto
italic_font auto
bold_italic_font auto
font_size 14.0

# 175% was excessive; this is a comfortable range
adjust_line_height 175%


# ----------------------------
# Theme
# ----------------------------
# Keep a single include; manage themes by swapping this file
include current-theme.conf


# ----------------------------
# Splits (no tmux)
# ----------------------------
map cmd+d launch --location=vsplit
map cmd+shift+d launch --location=hsplit

# Navigate splits (loop)
# Cycle through splits (like "alt-tab" but for panes)
map cmd+l next_window
map cmd+shift+l previous_window

# Resize splits (conflict-free, ergonomic)
map alt+h resize_window narrower  5
map alt+l resize_window wider     5
map alt+k resize_window taller    2
map alt+j resize_window shorter   2

# ----------------------------
# Scrolling in 
# ----------------------------
scrollback_lines	5000

