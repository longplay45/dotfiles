# ============================================================
# File open actions (used when you cmd+click paths, open URLs,
# or when Kitty needs to decide how to open a file)
# ============================================================

# Open text files in your editor ($EDITOR must be set)
protocol file
mime text/*
action launch --type=os-window $EDITOR $FILE_PATH

# Open image files inside Kitty using icat (keeps window open)
protocol file
mime image/*
action launch --type=os-window kitty +kitten icat --hold $FILE_PATH