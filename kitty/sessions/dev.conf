# Project root
cd $HOME/Docs/Dev/swiss-grid-generator

# Force tall layout + options (for THIS tab)
layout tall
enabled_layouts tall:bias=50;full_size=1;mirrored=false

# Create windows in order:
# 1) left full-height
launch --cwd $HOME/Docs/Dev/swiss-grid-generator

# 2–3) right side stacked vertically
launch --cwd $HOME/Docs/Dev/swiss-grid-generator
launch zsh -c "cd webapp && npm run dev"
